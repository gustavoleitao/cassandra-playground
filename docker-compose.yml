services:
  cassandra:
    image: cassandra:5
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: playground
      MAX_HEAP_SIZE: "512M"
      HEAP_NEWSIZE: "100M"
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  playground:
    image: gustavoleitao/cassandra-playground:latest
    ports:
      - "3001:3001"
    depends_on:
      cassandra:
        condition: service_healthy

volumes:
  cassandra_data:
